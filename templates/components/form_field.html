<div>
    <label for="{{ field.id_for_label }}" class="mb-1.5 block text-sm font-semibold text-slate-700">
        {{ field.label }}{% if field.field.required %}<span class="ml-0.5 text-rose-500">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
        <p class="mt-1 text-xs text-slate-500">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
        <p class="mt-1.5 text-sm text-rose-600">{{ field.errors.0 }}</p>
    {% endif %}
</div>
